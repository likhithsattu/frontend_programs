<body>
    <script>
        //type conversion
        console.log(Boolean(5))
        console.log(String(789))
        console.log("likhith")
        console.log(Number("likhith"))


        //type coercion
        console.log("5"-3);
        console.log("12"/3);
        console.log(Number("5")+3);

        /////////////////////////////////

        console.log(typeof([2,3,4,5]))
        console.log(typeof(null))
        
    </script>
