<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let chandana="ABCDEfghtyuhhgfdeesdhh";
        console.log(chandana)
        console.log(chandana.length)
        console.log(chandana.charAt(5))
        console.log(chandana.toLowerCase())
        console.log(chandana.toUpperCase())
        console.log(chandana.indexOf("g"))
        console.log(chandana.lastIndexOf("e"))

        let suvarna=[2,3,4,5,6]
        console.log(suvarna.join("*"))

        //Math

        console.log(Math.random()*5)
        console.log(Math.floor(4.5))
        console.log(Math.ceil(4.5))
        console.log(Math.round(4.2))
        console.log(Math.floor(Math.random()*5))
        console.log(Math.floor(Math.random()*5+1))
        console.log(Math.floor(Math.random()*9000+1000))

        //Date
        let newDate=new Date()  //constructor function

        console.log(newDate.getFullYear())
        console.log(newDate.getMonth()+1)
        console.log(newDate.getDate())

        let year=newDate.getFullYear()
        let month=newDate.getMonth()+1
        let date=newDate.getDate()
        console.log(`${month}/${date}/${year}`)

    </script>
</body>
</html>
