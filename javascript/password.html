<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="password" placeholder="enter your password" id="password_field">
    <input type="button" value="show" onclick="password()" id="btn">

    <script>

        function password(){
            let a=document.getElementById("password_field");
            let b=document.getElementById("btn");
            
            if (a.type=="password"){
                a.setAttribute("type","text");
                b.setAttribute("value","hide")

            }else{
                a.setAttribute("type","password");
                b.setAttribute("value","show")
        }
        } 

        
    </script>
</body>
</html>
