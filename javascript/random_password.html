<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let password_list="abedefghijklmnopqrstuvwxyz1234567890@#$%^&*()"
        let password_length=password_list.length
        // console.log(password_length)
        let password=[]

        for(i=1;i<9;i++){
            let random_number=Math.floor(Math.random()*password_length)
            // console.log(random_number)
            let random_character=password_list.charAt(random_number)
            console.log(random_character)
            password.push(random_character)
        }
        console.log(password)
        let random=password.join("")
        console.log(random)

    </script>
</body>
</html>
