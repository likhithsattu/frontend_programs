<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section4</title>
    <style>
        body{
            background-color: whitesmoke;
            font-family: sans-serif;
        }
        .parent-container{
            display: flex;
            gap: 15px;
            margin-left:100px ;
        }
        .icons{
            display: flex;
            flex-direction: column;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            gap: 10px;
            width: 190%;
            transition: transform 0.2s;
        }

        .icon-row{
            display: grid;
            /* flex-wrap: wrap; */
            grid-template-columns:150px 150px 150px 150px 150px 150px ;
            gap: 25px;
        }

        .icons a:hover{
            transform: scale(1.05);
        }

        .icons a{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            text-align: center;
            color: black;
            font-size: 14px;
            width: 140px;
            padding: 5px;
            gap: 30px;
            border: 2px solid whitesmoke;
            border-radius: 10px;
        }
        .icons .img1{
            width: 60px;
            margin-bottom: 6px;
        }

        .upi img{
            width: 80%;
        }
        

        .slim{
        display: flex;
        justify-content: center; 
        gap: 20px;
        margin-top: 20px;
        padding: 0 100px;      
        }

        .slim img{
        width: 100%;
        display: block;           
        margin-top: 5px;               
        }

        .slim a{
        flex: 1;
        transition: transform 0.2s;  
        }

        .slim a:hover{
            transform: scale(1.05);
        }

    
        .images-block{
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding: 0 100px;  
            gap: 10px;
        }


        .images-block img{
        width: 100%;
        display: block;           
        margin-top: 5px;  
        }
        
    </style>
</head>
