<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>section5</title>
    <style>
        body{
            font-family: sans-serif;
            background-color: whitesmoke;
        }
        .parent{
            display: flex;
            border-radius: 15px;
            background-color: white;
            margin: 10%;
            padding: 5% 0% 4% 8%;
            gap: 40px;   
        }
        .block-1{
            width: 60%;
            margin-top: 40px;
        }
        .block-1 .p1{
            font-size: 40px;
            font-weight: bold;
        }
        .block-1 .img_1{
            width: 20%;
        }
        .block-1 h1{
            font-size: 2.5rem;
        }

        .block-1 button{
            padding: 5px;
            border-radius: 999px;
            width: 40% ;
            font-size: medium;
            background-color: #002970;
            color: white;
            border: none;
            cursor: pointer;
        }
        .block-1 button:hover{
            background-color: white;
            color: #002970;
            border: 1px solid #002970;   
        }
        .img-2{
            width: 80%;
            padding-right: 0%;
        }
    </style>
</head>
<body>
    <div class="parent">

        <div class="block-1">
            <img class="img_1" src="https://assetscdn1.paytm.com/images/catalog/view/342368/1725447964962.png" alt="">
            <h1 class="p1">Accept payments<br><span style="color:#00BAF2;">online & offline</span></h1>
            <p class="h1">Millions of small & big businesses use Paytm to<br> accept payments anywhere any time with a wide <br>range of solutions for all kind of merchants
Learn More -></p>
            <button>Learn More -></button>
        </div>
        <div class="block-2">
            <img class="img-2" src="https://assetscdn1.paytm.com/images/catalog/view/1752735625336.png" alt="">
        </div>

    </div>
</body>
</html>
