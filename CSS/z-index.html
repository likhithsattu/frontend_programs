<html lang="en">

      .box1 {
        width: 200px;
        height: 200px;

      }
      .box2 {
        width: 200px;
        height: 200px;
        background-color: rgb(239, 7, 7);
        position: absolute;
        top: 90px;
        left: 90px;
        z-index: 1;
      }
      .box3 {
        width: 200px;
        height: 200px;
        background-color: rgb(160, 236, 7);
        position: absolute;
        top: 130px;
        left: 130px;
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
  </body>
</html>
