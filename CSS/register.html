<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed | LinkedIn</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<style>
body{
  font-family: Arial, sans-serif;
}
.parent-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  margin-top:40px;
}
.card-item{
  width:35%;
  border:2px solid black;
  padding:15px;
  text-align:center;
}
.card-item-1{
  width:15%;
  border:2px solid black;
  padding:15px;
  text-align:center;
}
.card-1 img{
  width:40px;
  height:40px;
  border-radius:50%;
  border: solid;
}
.card-2 img{
  width:80px;
  height:80px;
  border-radius:50%;
  border: solid;
}
.card-item input{
  width:70%;
  height:35px;
  border-radius:25px;
  padding-left:10px;
  margin-left:10px;
}
.icon-container{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:15px;
  font-size:20px;
}
.card-item-1 button{
  width: 150px;
  height: 2%;
  border-radius: 500px;
}
.card-item-1 button:hover{
  background-color:blue;
  color:white;
}
</style>
</head>
<body>
<div class="parent-container">
<div class="card-item card-1">
  <img src="./tom.jpg" alt="">
  <input type="text" placeholder="Share a post">
  <div class="icon-container">
    <i class="fa-brands fa-youtube"></i>
    <i class="fa-solid fa-photo-film"></i>
    <i class="fa-solid fa-list"></i>
  </div>
</div>
<div class="card-item-1 card-2">
  <img src="./shin.png" width="40">
  <h2>Shinchan</h2>
  <a href="http://127.0.0.1:5500/CSS/register.html"></a>
  <button>Connect</button>
</div>
</div>
</body>
</html>
