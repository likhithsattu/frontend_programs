<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>section3</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <style>
      .paytm-credit-container {
        gap: 20px;
        display: flex;
        margin: 5%;
      }
      body {
        font-family: sans-serif;
        background-color: whitesmoke;
      }
      .credit-card {
        /* border: 2px solid black; */
        padding: 5% 4% 3% 2%;
        border-radius: 20px;
        width: 40%;
        height: 15cm;
        margin: auto;
      }
      .credit-card .image1 {
        width: 10%;
      }
      .credit-card button {
        padding: 5px 5px;
        border-radius: 999px;
        /* width: 10% ; */
        font-size: medium;
        cursor: pointer;
        color: #002970;
      }
      .credit-card button:hover {
        background-color: #002970;
        color: white;
      }
      .credit-card .image2 {
        width: 20%;
      }
      .credit-card .apply {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
      }
      .credit-card .image3 {
        width: 85%;
      }
      .credit-bg{
        background-image: url(https://assetscdn1.paytm.com/images/catalog/view_item/1725638720587.png);
        background-size: cover;
        background-position: center;
      }
      .family-bg{
            background: linear-gradient(#D3F5FF, #FFFFFF);
      }
    </style>
  </head>
  <body>
    <div class="paytm-credit-container">
      <div class="credit-card credit-bg">
        <img
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2988623/27220898816562102.png"
          alt=""
          class="image1"
        />
        <h1>
          One destination for <br /><span style="color: #00baf2"
            >Credit Cards</span
          >
        </h1>
        <p>
          Paytm HDFC, SBI Card & Axis Bank Credit Card with<br />assured
          Cashback and incredible offers.
        </p>
        <div class="apply">
          <button>Apply Now <i class="fa-solid fa-right-long"></i></button>
          <img
            src="https://assetscdn1.paytm.com/images/catalog/view_item/1741675100265.png"
            alt=""
            class="image2"
          />
        </div>
        <img
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2988623/27221716933469500.png"
          alt=""
          class="image3"
        />
      </div>

      <div class="credit-card family-bg">
        <img
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2834804/1725623952233.png"
          alt=""
          class="image1"
        />
        <h1>
          Insurance ka <br /><span style="color: #00baf2">Super Market</span>
        </h1>
        <p>
          A Smart, Simple & Transparent Platform to Explore &<br />Purchase
          Insurance.
        </p>

        <div class="apply">
          <button>Get It Now <i class="fa-solid fa-right-long"></i></button>
        </div>

        <img
          src="https://assetscdn1.paytm.com/images/catalog/view_item/2988624/27217428616091880.png"
          alt=""
          class="image3"
        />
      </div>
    </div>
  </body>
</html>
