<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Popup</title>
<!-- <form action="http://127.0.0.1:5500/CSS/project_otp.html"></form> -->
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.login-box {
  width: 450px;
  margin: 50px auto;
  background: white;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.login-header {
  background: #2c2f8f;
  color: white;
  padding: 15px 20px;
  font-size: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.close-btn {
  font-size: 20px;
  cursor: pointer;
}

.login-body {
  padding: 25px;
}

.label {
  font-size: 16px;
  margin-bottom: 10px;
  display: block;
}

.input-box {
  display: flex;
  align-items: center;
  border: 1px solid #ccc;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 20px;
}

.flag {
  padding: 10px;
  background: #f1f1f1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.flag img {
  width: 20px;
}

.code {
  font-weight: bold;
}

.input-box input {
  border: none;
  outline: none;
  padding: 12px;
  flex: 1;
  font-size: 14px;
}

.submit-btn {
  display: block;        /* IMPORTANT */
  width: 100%;
  padding: 12px;
  background: #159a8c;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 18px;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  box-sizing: border-box;  /* prevents extra right space */
}

.submit-btn:hover {
  background: #12877a;
}
</style>

</head>
<body>

<div class="login-box">
  <div class="login-header">
    <span>Sign In</span>
    <!-- <span class="close-btn">&times;</span> -->
  </div>

  <div class="login-body">
    <label class="label">Mobile Number</label>

    <div class="input-box">
      <div class="flag">
        <img src="https://flagcdn.com/w40/in.png">
        <span class="code">+91</span>
      </div>
      <input type="text" placeholder="Enter Your Mobile Number">
    </div>
<a href="./project_otp.html" class="submit-btn">Submit</a>
  </div>
</div>

</body>

</html>
