<!doctype html>
<html lang="en">
  <head>
    <!-- <link rel="stylesheet" href="http://127.0.0.1:5500/CSS/register.html"> -->
     <a href="http://127.0.0.1:5500/CSS/register.html"></a>
    <meta charset="UTF-8" />
    <title>LinkedIn</title>
    <style>
      body {
        margin: 0;
        background: linear-gradient(to right, #0f7c8a, #0a6f83);
        margin-top: auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        text-align: center;
        color: white;
      }
      .logo {
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 5px;
      }
      .logo span {
        background: white;
        color: #0a6f83;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .subtitle {
        margin-bottom: 20px;
        font-size: 18px;
      }
      .card {
        background: #e6e6e6;
        width: 300px;
        padding: 20px;
        border-radius: 3px;
        margin: auto;
        text-align: left;
      }
      label {
        font-size: 12px;
        color: #333;
      }
      input {
        width: 100%;
        padding: 8px;
        margin: 5px 0 12px 0;
        border: 1px solid #ccc;
        border-radius: 2px;
      }
      .terms {
        font-size: 11px;
        color: #555;
        text-align: center;
      }
      .terms a {
        color: #0073b1;
        text-decoration: none;
      }
      button {
        width: 100%;
        background: #0073b1;
        border: none;
        padding: 10px;
        color: white;
        font-weight: bold;
        border-radius: 3px;
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        background: #005f8d;
      }
      .signin {
        color:black;
        text-align: center;
        font-size: 13px;
        margin-top: 10px;
      }
      .signin a {
        color: #0073b1;
        text-decoration: none;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="logo">Linked<span>In</span></h1>
      <p class="subtitle">Make the most of your professional life</p>
      <div class="card">
        <form action="register.html">
          <label>First name</label>
          <input type="text" placeholder="" required/>
          <label>Last name</label>
          <input type="text" placeholder="" required/>
          <label>Email</label>
          <input type="email" required/>
          <label>Password (6 or more characters)</label>
          <input type="password" required/>
          <p class="terms">
            You agree to the LinkedIn <a href="#">User Agreement</a>,
            <a href="#">Privacy Policy</a>, and <a href="#">Cookie Policy</a>.
          </p>
          <button type="submit">Agree & Join</button>
          
          <p class="signin">Already on LinkedIn? <a href="#">Sign in</a></p>
        </form>
      </div>
      <p class="footer">LinkedIn Corporation @ 2018</p>
    </div>
  </body>
</html>
